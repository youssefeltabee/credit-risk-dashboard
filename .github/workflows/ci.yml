name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install pandas numpy scikit-learn xgboost pytest
      - name: Run tests
        run: python -m pytest src/test_dashboard.py -v
